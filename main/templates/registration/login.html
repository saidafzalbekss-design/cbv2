<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Kirish</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 100px auto; padding: 0 20px; background: #f0f2f5; }
        .container { background: white; border-radius: 10px; padding: 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; margin-bottom: 25px; }
        p { margin: 14px 0; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type=text], input[type=password] { width: 100%; padding: 9px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; margin-top: 20px; padding: 11px; background: #2c3e50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 15px; }
        button:hover { background: #1a252f; }
        .error { color: #e74c3c; font-size: 13px; background: #fdecea; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🔐 Tizimga kirish</h1>
    {% if form.errors %}
        <p class="error">Login yoki parol noto'g'ri!</p>
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Kirish</button>
    </form>
</div>
</body>
</html>
